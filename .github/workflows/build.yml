name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Clinkon1C.csproj

      - name: Build net8 (x64, self-contained)
        run: >
          dotnet publish src/Clinkon1C.csproj
          -f net8.0-windows
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:AssemblyVersion=1.0.0.${{ github.run_number }}
          -c Release
          -o publish/x64

      - name: Build net48 (legacy, Windows 7)
        run: >
          dotnet publish src/Clinkon1C.csproj
          -f net48
          -p:AssemblyVersion=1.0.0.${{ github.run_number }}
          -c Release
          -o publish/legacy

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Rename artifacts
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Rename-Item publish/x64/Clinkon1C.exe    "Clinkon1C-$ver-x64.exe"
          Rename-Item publish/legacy/Clinkon1C.exe "Clinkon1C-$ver-legacy.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Clinkon1C v${{ steps.version.outputs.version }}"
          body: |
            ## Clinkon1C v${{ steps.version.outputs.version }}

            **Файлы:**
            - `Clinkon1C-${{ steps.version.outputs.version }}-x64.exe` — Windows 10 / Server 2012 R2+, .NET 8 self-contained (не требует установки .NET)
            - `Clinkon1C-${{ steps.version.outputs.version }}-legacy.exe` — Windows 7 SP1+, требует .NET Framework 4.8

            Запускать от имени администратора.
          files: |
            publish/x64/Clinkon1C-${{ steps.version.outputs.version }}-x64.exe
            publish/legacy/Clinkon1C-${{ steps.version.outputs.version }}-legacy.exe
          draft: false
          prerelease: false
